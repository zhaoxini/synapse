<!doctype html>
<html lang="en" class="theme-light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#ffffff" />
  <title>Synapse</title>
  <link rel="stylesheet" href="vendor/github-dark.min.css" />
  <link rel="stylesheet" href="app.css" />
</head>
<body class="mode-workspaces">
  <header id="topbar">
    <div class="topbar-left">
      <button id="backBtn" class="iconbtn iconbtn-filled" aria-label="Back" hidden>
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M12.5 4.5L7 10l5.5 5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="workspaceAvatar" class="avatar-btn" aria-label="Workspaces">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3l1.8 4.2L18 9l-4.2 1.8L12 15l-1.8-4.2L6 9l4.2-1.8L12 3z" fill="currentColor" opacity=".9"/><path d="M5 14l.9 2.1L8 17l-2.1.9L5 20l-.9-2.1L2 17l2.1-.9L5 14z" fill="currentColor" opacity=".55"/><path d="M17 14l.9 2.1L20 17l-2.1.9L17 20l-.9-2.1L14 17l2.1-.9L17 14z" fill="currentColor" opacity=".55"/></svg>
      </button>
    </div>
    <div id="chatTitle" class="chat-title" hidden>Chat</div>
    <div class="topbar-right">
      <button id="searchBtn" class="iconbtn iconbtn-filled" aria-label="Search">
        <svg width="17" height="17" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.6"/><path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
      <button id="menuBtn" class="iconbtn iconbtn-filled" aria-label="Menu" hidden>
        <svg width="17" height="17" viewBox="0 0 20 20" fill="none"><path d="M4 6h12M4 10h12M4 14h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
      <button id="newBtn" class="iconbtn iconbtn-filled" aria-label="New session">
        <svg width="17" height="17" viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>

  <div id="reconnect">Reconnecting…</div>
  <div id="toast"><span id="toastText"></span><button id="toastClose">✕</button></div>

  <div id="searchWrap" class="hidden">
    <input id="searchInput" type="search" placeholder="Search" autocomplete="off" />
  </div>

  <div id="pageHead">
    <h1 id="pageTitle">Workspaces</h1>
  </div>

  <!-- Workspaces root -->
  <section id="workspaceView">
    <div id="workspaceList"></div>
  </section>

  <!-- Session list for a repo -->
  <section id="sessionView">
    <div id="pullRefresh" class="hidden" aria-hidden="true"><span class="pull-spin"></span><span class="pull-label">Release to refresh</span></div>
    <div id="sessionList"></div>
    <button type="button" id="archivedToggle" class="archived-toggle hidden">Show archived</button>
  </section>

  <!-- Chat -->
  <div id="chatView">
    <main id="scroller">
      <div id="messages"></div>
    </main>
    <button id="newPill">↓ New</button>
    <div id="empty">
      <div class="brand">✦</div>
      <h1>Let's build</h1>
      <p id="emptySub"></p>
      <div class="suggestions">
        <button data-prompt="Summarize the recent changes in this repo.">Summarize recent changes</button>
        <button data-prompt="Explain what this project does.">Explain this project</button>
        <button data-prompt="Find and fix any failing tests.">Find and fix failing tests</button>
      </div>
    </div>
  </div>

  <!-- Shared composer (list + chat) -->
  <footer id="composer">
    <div id="composerDock">
      <div id="composerRow">
        <button id="attachBtn" class="dock-btn dock-plus" aria-label="More">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
        <textarea id="input" rows="1" placeholder="Plan, ask, build…"></textarea>
        <button id="micBtn" class="dock-btn dock-mic" aria-label="Voice">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="6" y="2" width="4" height="7" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M4 7.5a4 4 0 008 0M8 11.5V14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
        <div id="composerControls">
          <button class="dock-btn dock-text" id="modelCtl"><span id="modelLabel">Auto</span></button>
          <span class="spacer"></span>
          <button id="sendBtn" aria-label="Send">
            <svg class="ico-send" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 12V4M8 4L4.5 7.5M8 4l3.5 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <svg class="ico-stop" width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="2" y="2" width="8" height="8" rx="1" fill="currentColor"/></svg>
          </button>
        </div>
      </div>
    </div>
    <div id="modelMenu" class="model-menu"></div>
    <div id="localMenu" class="model-menu"></div>
    <div id="attachMenu" class="model-menu"></div>
  </footer>

  <div id="sheetMask"></div>
  <div id="bottomSheet">
    <div id="sheetHandle"></div>
    <div id="sheetHead">
      <button id="sheetClose" aria-label="Close">✕</button>
      <span id="sheetTitle"></span>
    </div>
    <div id="sheetBody"></div>
  </div>

  <div id="connectOverlay">
    <div class="connect-card">
      <h2>Connect to Claude Code</h2>
      <p class="connect-hint">Paste the <code>synapse://</code> link from the terminal where <code>synapse-server</code> is running.</p>
      <textarea id="pairLink" rows="3" placeholder="synapse://192.168.1.10:4173?token=CODE&tls=0"></textarea>
      <button id="pairConnect" class="connect-btn">Connect</button>
      <details class="connect-manual">
        <summary>Manual connection</summary>
        <label>Host <input id="pairHost" type="text" placeholder="192.168.1.10" autocomplete="off" /></label>
        <label>Port <input id="pairPort" type="text" placeholder="4173" inputmode="numeric" /></label>
        <label>Token <input id="pairToken" type="text" placeholder="CODE" autocomplete="off" /></label>
        <label class="pair-tls"><input id="pairTls" type="checkbox" /> Secure (wss / TLS)</label>
        <button id="pairManualConnect" class="connect-btn secondary">Connect manually</button>
      </details>
    </div>
  </div>

  <script src="vendor/marked.min.js"></script>
  <script src="vendor/highlight.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
