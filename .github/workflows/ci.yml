# Synapse CI: format check, clippy, tests, build, and iOS static-library
# compilation. Runs on every push and pull request.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-test:
    name: fmt + clippy + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux fontconfig for Slint)
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo build (release)
        run: cargo build --workspace --release

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: synapse-server-linux
          path: target/release/synapse-server

  ios-lib:
    name: iOS static library
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      # Confirm the full Xcode + iphoneos SDK is present (macOS runners ship
      # Xcode; the ring C/asm build for iOS needs the iphoneos SDK).
      - name: Verify iphoneos SDK
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-ios-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-ios-cargo-

      - name: Build iOS arm64 static library
        run: cargo rustc -p synapse-app --lib --target aarch64-apple-ios --crate-type staticlib --release

      - name: Verify static library
        run: |
          test -f target/aarch64-apple-ios/release/libsynapse_app.a
          ls -lh target/aarch64-apple-ios/release/libsynapse_app.a

      - name: Upload iOS static library
        uses: actions/upload-artifact@v4
        with:
          name: synapse-app-ios-staticlib
          path: target/aarch64-apple-ios/release/libsynapse_app.a
