# Synapse release — builds server + relay binaries for all platforms and
# publishes a GitHub Release when a version tag is pushed (e.g. v0.2.0).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            ext: ""
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux cross toolchain (aarch64)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build synapse-server + synapse-relay (release)
        env:
          SYNAPSE_RELAY: ${{ vars.SYNAPSE_RELAY }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release -p synapse-server -p synapse-relay --target ${{ matrix.target }}

      - name: Stage release directory (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="synapse-${VERSION}-${{ matrix.target }}"
          mkdir -p "${STAGE}/bin"
          cp "target/${{ matrix.target }}/release/synapse-server${{ matrix.ext }}" "${STAGE}/bin/"
          cp "target/${{ matrix.target }}/release/synapse-relay${{ matrix.ext }}" "${STAGE}/bin/"
          cp scripts/SERVER-README.md "${STAGE}/README.md"
          cp scripts/install-server.sh "${STAGE}/install.sh"
          cp scripts/synapse-server-wrapper.sh "${STAGE}/synapse-server-wrapper.sh"
          cp scripts/install.sh "${STAGE}/install-remote.sh"
          echo "${VERSION}" > "${STAGE}/VERSION"
          tar -czf "${STAGE}.tar.gz" "${STAGE}"
          ls -lh "${STAGE}.tar.gz"

      - name: Stage release directory (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $stage = "synapse-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "$stage/bin" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/synapse-server.exe" "$stage/bin/"
          Copy-Item "target/${{ matrix.target }}/release/synapse-relay.exe" "$stage/bin/"
          Copy-Item scripts/SERVER-README.md "$stage/README.md"
          Copy-Item scripts/install-server.sh "$stage/install.sh"
          Copy-Item scripts/synapse-server-wrapper.sh "$stage/synapse-server-wrapper.sh"
          Copy-Item scripts/install.sh "$stage/install-remote.sh"
          Set-Content "$stage/VERSION" $version
          Compress-Archive -Path $stage -DestinationPath "$stage.zip" -Force
          Get-Item "$stage.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: synapse-${{ matrix.target }}
          path: synapse-*-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: find dist -type f | sort

      - name: Attach install scripts
        run: |
          cp scripts/install.sh dist/install.sh
          cp scripts/install-relay.sh dist/install-relay.sh
          chmod +x dist/install.sh dist/install-relay.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**/*
          body_path: scripts/RELEASE-NOTES.md

  sync-mirror:
    name: sync China install mirror
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Refresh zx0623.duckdns.org release cache
        env:
          RELAY_SSH: ${{ secrets.RELAY_SSH }}
          RELAY_SSH_KEY: ${{ secrets.RELAY_SSH_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "${RELAY_SSH_KEY:-}" ] || [ -z "${RELAY_SSH:-}" ]; then
            echo "RELAY_SSH / RELAY_SSH_KEY not configured — skip mirror sync"
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$RELAY_SSH_KEY" > ~/.ssh/relay_key
          chmod 600 ~/.ssh/relay_key
          host="${RELAY_SSH#*@}"
          ssh-keyscan -H "$host" >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -i ~/.ssh/relay_key -o StrictHostKeyChecking=accept-new \
            scripts/install.sh scripts/install-relay.sh \
            scripts/sync-mirror-vps.sh scripts/synapse-server-wrapper.sh \
            "${RELAY_SSH}:/opt/synapse/scripts/"
          ssh -i ~/.ssh/relay_key -o StrictHostKeyChecking=accept-new "${RELAY_SSH}" \
            "chmod +x /opt/synapse/scripts/sync-mirror-vps.sh && \
             SYNAPSE_ROOT=/opt/synapse SYNAPSE_VERSION=${TAG} SYNAPSE_FORCE_SYNC=1 \
             bash /opt/synapse/scripts/sync-mirror-vps.sh"

  deploy-relay:
    name: upgrade synapse-relay on VPS
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux server artifact
        uses: actions/download-artifact@v4
        with:
          name: synapse-x86_64-unknown-linux-gnu
          path: dist

      - name: Install relay binary on VPS
        env:
          RELAY_SSH: ${{ secrets.RELAY_SSH }}
          RELAY_SSH_KEY: ${{ secrets.RELAY_SSH_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "${RELAY_SSH_KEY:-}" ] || [ -z "${RELAY_SSH:-}" ]; then
            echo "RELAY_SSH / RELAY_SSH_KEY not configured — skip relay deploy"
            exit 0
          fi
          ver="${TAG#v}"
          tarfile="$(ls dist/synapse-${ver}-x86_64-unknown-linux-gnu.tar.gz)"
          tar -xzf "${tarfile}" -C dist
          BIN="dist/synapse-${ver}-x86_64-unknown-linux-gnu/bin/synapse-relay"
          test -x "${BIN}"
          mkdir -p ~/.ssh
          printf '%s\n' "$RELAY_SSH_KEY" > ~/.ssh/relay_key
          chmod 600 ~/.ssh/relay_key
          host="${RELAY_SSH#*@}"
          ssh-keyscan -H "$host" >> ~/.ssh/known_hosts 2>/dev/null || true
          scp -i ~/.ssh/relay_key -o StrictHostKeyChecking=accept-new \
            "${BIN}" "${RELAY_SSH}:/opt/synapse-relay/bin/synapse-relay.new"
          ssh -i ~/.ssh/relay_key -o StrictHostKeyChecking=accept-new "${RELAY_SSH}" '
            set -e
            systemctl stop synapse-relay
            install -m 755 /opt/synapse-relay/bin/synapse-relay.new /opt/synapse-relay/bin/synapse-relay
            rm -f /opt/synapse-relay/bin/synapse-relay.new
            systemctl start synapse-relay
            sleep 2
            systemctl is-active synapse-relay
          '

      - name: Verify pairing exchange API
        run: |
          code=$(curl -s -o /tmp/exchange-body -w '%{http_code}' -X POST \
            'https://zx0623.duckdns.org/api/v1/pairing-codes/exchange' \
            -H 'Content-Type: application/json' \
            -d '{"code":"000000"}')
          echo "HTTP ${code}"
          cat /tmp/exchange-body || true
          test "${code}" = "404"
          grep -q 'invalid or expired pairing code' /tmp/exchange-body
