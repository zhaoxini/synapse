# Synapse on zx0623.duckdns.org
# cliproxyapi config backed up to sites-available/cliproxyapi.bak

server {
    listen 80;
    server_name zx0623.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name zx0623.duckdns.org;
    ssl_certificate /etc/letsencrypt/live/zx0623.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zx0623.duckdns.org/privkey.pem;

    root /var/www/synapse;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:4173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        error_page 418 = @synapse_ws;
        if ($http_upgrade = "websocket") {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    location @synapse_ws {
        proxy_pass http://127.0.0.1:4173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}
