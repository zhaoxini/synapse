# Example nginx site for the Synapse web chat preview bundle.
# Copy to /etc/nginx/sites-available/synapse-preview and symlink sites-enabled.
server {
    listen 80;
    server_name preview.example.com;

    root /var/www/synapse-preview;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — short cache; redeploy invalidates via rsync --delete
    location ~* \.(css|js|html)$ {
        add_header Cache-Control "no-cache";
    }
}
